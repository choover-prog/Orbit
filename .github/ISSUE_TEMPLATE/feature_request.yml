name: Feature request
description: Propose a bounded Orbit capability or experience improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: What everyday problem should Orbit solve?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
  - type: dropdown
    id: action-level
    attributes:
      label: Highest action-ladder level
      options: [Observe, Summarize, Recommend, Draft, Simulate, Request approval, Execute, Verify, Offer undo]
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and permission implications
    validations:
      required: true
